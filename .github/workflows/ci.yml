name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - name: Require additional scrape job
        run: |
          count=$(grep -c "job_name:" prometheus.yml || true)
          test "$count" -ge 2
